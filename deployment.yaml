apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-csharp-app
  namespace: devops-bootcamp
  labels:
    app: my-csharp-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-csharp-app
  template:
    metadata:
      labels:
        app: my-csharp-app
    spec:
      containers:
      - name: my-csharp-app
        image: my-csharp-app:v1
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /weatherforecast
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /weatherforecast
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        envFrom:
        - configMapRef:
            name: my-csharp-config
        - secretRef:
            name: my-csharp-secret
